<svg width="100%" viewBox="0 0 1000 300" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vasandhan P K G – Full Stack Developer & AI Enthusiast</title>
  <desc>Banner for Vasandhan PKG's GitHub profile</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D1A"/>
      <stop offset="50%" stop-color="#0F1832"/>
      <stop offset="100%" stop-color="#0A1A2E"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#378ADD" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#378ADD" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5DCAA5"/>
      <stop offset="50%" stop-color="#85B7EB"/>
      <stop offset="100%" stop-color="#AFA9EC"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0"/>
      <stop offset="30%" stop-color="#1D9E75"/>
      <stop offset="70%" stop-color="#378ADD"/>
      <stop offset="100%" stop-color="#534AB7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="300" fill="url(#bg)"/>

  <!-- Subtle glow blobs -->
  <ellipse cx="150" cy="150" rx="220" ry="160" fill="url(#glow1)" opacity="0.6"/>
  <ellipse cx="900" cy="120" rx="200" ry="140" fill="url(#glow2)" opacity="0.5"/>

  <!-- Grid dots pattern -->
  <g opacity="0.08">
    <rect x="0" y="0" width="1000" height="300" fill="none"/>
    <!-- Dot grid via repeating circles -->
    <g fill="#9FE1CB">
      <circle cx="50" cy="50" r="1.5"/><circle cx="100" cy="50" r="1.5"/><circle cx="150" cy="50" r="1.5"/><circle cx="200" cy="50" r="1.5"/><circle cx="250" cy="50" r="1.5"/><circle cx="300" cy="50" r="1.5"/><circle cx="350" cy="50" r="1.5"/><circle cx="400" cy="50" r="1.5"/><circle cx="450" cy="50" r="1.5"/><circle cx="500" cy="50" r="1.5"/><circle cx="550" cy="50" r="1.5"/><circle cx="600" cy="50" r="1.5"/><circle cx="650" cy="50" r="1.5"/><circle cx="700" cy="50" r="1.5"/><circle cx="750" cy="50" r="1.5"/><circle cx="800" cy="50" r="1.5"/><circle cx="850" cy="50" r="1.5"/><circle cx="900" cy="50" r="1.5"/><circle cx="950" cy="50" r="1.5"/>
      <circle cx="50" cy="100" r="1.5"/><circle cx="100" cy="100" r="1.5"/><circle cx="150" cy="100" r="1.5"/><circle cx="200" cy="100" r="1.5"/><circle cx="250" cy="100" r="1.5"/><circle cx="300" cy="100" r="1.5"/><circle cx="350" cy="100" r="1.5"/><circle cx="400" cy="100" r="1.5"/><circle cx="450" cy="100" r="1.5"/><circle cx="500" cy="100" r="1.5"/><circle cx="550" cy="100" r="1.5"/><circle cx="600" cy="100" r="1.5"/><circle cx="650" cy="100" r="1.5"/><circle cx="700" cy="100" r="1.5"/><circle cx="750" cy="100" r="1.5"/><circle cx="800" cy="100" r="1.5"/><circle cx="850" cy="100" r="1.5"/><circle cx="900" cy="100" r="1.5"/><circle cx="950" cy="100" r="1.5"/>
      <circle cx="50" cy="150" r="1.5"/><circle cx="100" cy="150" r="1.5"/><circle cx="150" cy="150" r="1.5"/><circle cx="200" cy="150" r="1.5"/><circle cx="250" cy="150" r="1.5"/><circle cx="300" cy="150" r="1.5"/><circle cx="350" cy="150" r="1.5"/><circle cx="400" cy="150" r="1.5"/><circle cx="450" cy="150" r="1.5"/><circle cx="500" cy="150" r="1.5"/><circle cx="550" cy="150" r="1.5"/><circle cx="600" cy="150" r="1.5"/><circle cx="650" cy="150" r="1.5"/><circle cx="700" cy="150" r="1.5"/><circle cx="750" cy="150" r="1.5"/><circle cx="800" cy="150" r="1.5"/><circle cx="850" cy="150" r="1.5"/><circle cx="900" cy="150" r="1.5"/><circle cx="950" cy="150" r="1.5"/>
      <circle cx="50" cy="200" r="1.5"/><circle cx="100" cy="200" r="1.5"/><circle cx="150" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/><circle cx="250" cy="200" r="1.5"/><circle cx="300" cy="200" r="1.5"/><circle cx="350" cy="200" r="1.5"/><circle cx="400" cy="200" r="1.5"/><circle cx="450" cy="200" r="1.5"/><circle cx="500" cy="200" r="1.5"/><circle cx="550" cy="200" r="1.5"/><circle cx="600" cy="200" r="1.5"/><circle cx="650" cy="200" r="1.5"/><circle cx="700" cy="200" r="1.5"/><circle cx="750" cy="200" r="1.5"/><circle cx="800" cy="200" r="1.5"/><circle cx="850" cy="200" r="1.5"/><circle cx="900" cy="200" r="1.5"/><circle cx="950" cy="200" r="1.5"/>
      <circle cx="50" cy="250" r="1.5"/><circle cx="100" cy="250" r="1.5"/><circle cx="150" cy="250" r="1.5"/><circle cx="200" cy="250" r="1.5"/><circle cx="250" cy="250" r="1.5"/><circle cx="300" cy="250" r="1.5"/><circle cx="350" cy="250" r="1.5"/><circle cx="400" cy="250" r="1.5"/><circle cx="450" cy="250" r="1.5"/><circle cx="500" cy="250" r="1.5"/><circle cx="550" cy="250" r="1.5"/><circle cx="600" cy="250" r="1.5"/><circle cx="650" cy="250" r="1.5"/><circle cx="700" cy="250" r="1.5"/><circle cx="750" cy="250" r="1.5"/><circle cx="800" cy="250" r="1.5"/><circle cx="850" cy="250" r="1.5"/><circle cx="900" cy="250" r="1.5"/><circle cx="950" cy="250" r="1.5"/>
    </g>
  </g>

  <!-- Corner decorative circuit lines -->
  <g stroke="#1D9E75" stroke-width="1" fill="none" opacity="0.3">
    <polyline points="0,0 80,0 80,30 120,30"/>
    <circle cx="120" cy="30" r="3" fill="#1D9E75"/>
    <polyline points="0,60 40,60 40,90"/>
    <circle cx="40" cy="90" r="2.5" fill="#1D9E75"/>
    <polyline points="1000,300 920,300 920,270 880,270"/>
    <circle cx="880" cy="270" r="3" fill="#378ADD" stroke="#378ADD"/>
    <polyline points="1000,240 960,240 960,210"/>
    <circle cx="960" cy="210" r="2.5" fill="#378ADD" stroke="#378ADD"/>
  </g>

  <!-- Decorative brackets -->
  <g fill="none" stroke="#534AB7" stroke-width="1.5" opacity="0.4">
    <polyline points="60,80 40,80 40,220 60,220"/>
    <polyline points="940,80 960,80 960,220 940,220"/>
  </g>

  <!-- Accent colored rectangles -->
  <rect x="40" y="148" width="4" height="4" fill="#1D9E75" rx="1"/>
  <rect x="956" y="148" width="4" height="4" fill="#378ADD" rx="1"/>

  <!-- Main name -->
  <text x="500" y="118" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="62" font-weight="700" letter-spacing="4"
        fill="url(#textGrad)">VASANDHAN P K G</text>

  <!-- Divider line -->
  <line x1="200" y1="138" x2="800" y2="138" stroke="url(#lineGrad)" stroke-width="1.5"/>

  <!-- Role tags -->
  <g font-family="'Segoe UI', 'Courier New', monospace" font-size="14" font-weight="400">
    <!-- Tag 1 -->
    <rect x="200" y="152" width="170" height="28" rx="14" fill="#0F6E56" fill-opacity="0.35" stroke="#1D9E75" stroke-width="0.8"/>
    <text x="285" y="171" text-anchor="middle" fill="#5DCAA5">⚡ Full Stack Dev</text>
    <!-- Tag 2 -->
    <rect x="385" y="152" width="130" height="28" rx="14" fill="#185FA5" fill-opacity="0.35" stroke="#378ADD" stroke-width="0.8"/>
    <text x="450" y="171" text-anchor="middle" fill="#85B7EB">🤖 AI / ML</text>
    <!-- Tag 3 -->
    <rect x="530" y="152" width="170" height="28" rx="14" fill="#3C3489" fill-opacity="0.35" stroke="#534AB7" stroke-width="0.8"/>
    <text x="615" y="171" text-anchor="middle" fill="#AFA9EC">📡 IoT &amp; Embedded</text>
  </g>

  <!-- College + degree -->
  <text x="500" y="218" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" fill="#B4B2A9" letter-spacing="2">
    B.E ELECTRONICS &amp; COMMUNICATION  ·  SAVEETHA ENGINEERING COLLEGE  ·  2024–2028
  </text>

  <!-- Bottom accent line -->
  <line x1="350" y1="235" x2="650" y2="235" stroke="url(#lineGrad)" stroke-width="0.8"/>

  <!-- Bottom tagline -->
  <text x="500" y="258" text-anchor="middle"
        font-family="'Segoe UI', 'Courier New', monospace"
        font-size="12" fill="#5F5E5A" letter-spacing="3">
    CODE  ·  BUILD  ·  LEARN  ·  REPEAT
  </text>

  <!-- Small floating code symbols -->
  <g font-family="'Courier New', monospace" fill="#534AB7" opacity="0.25" font-size="18">
    <text x="75" y="140">&lt;/&gt;</text>
    <text x="895" y="165">{}</text>
  </g>
  <g font-family="'Courier New', monospace" fill="#1D9E75" opacity="0.2" font-size="14">
    <text x="82" y="165">fn()</text>
    <text x="888" y="140">[ ]</text>
  </g>
</svg>
